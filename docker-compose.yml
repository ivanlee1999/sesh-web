services:
  sesh-web:
    build: .
    container_name: sesh-web
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "3033:3000"
    env_file:
      - .env.local
    volumes:
      - /home/ivan/docker/sesh-web/data:/app/data

  caddy:
    image: caddy-cloudflare:latest
    container_name: sesh-caddy
    restart: unless-stopped
    env_file:
      - .env.caddy
    ports:
      - "443:443"
    environment:
      - CF_API_TOKEN=${CF_API_TOKEN}
    volumes:
      - /home/ivan/docker/caddy-sesh/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
